{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{{ url_for('treatment.index') }}">Treatment Companion</a></li>
<li class="breadcrumb-item active" aria-current="page">{{ title }}</li>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow mb-4">
        <div class="card-header py-3">
          <h6 class="m-0 font-weight-bold text-primary">{{ title }}</h6>
        </div>
        <div class="card-body">
          <form method="POST" action="">
            <div class="row mb-3">
              <div class="col-md-6">
                <label for="name" class="form-label">Medication Name *</label>
                <input type="text" class="form-control" id="name" name="name" required 
                       value="{{ med.name if med else '' }}" placeholder="e.g. Lisinopril">
              </div>
              <div class="col-md-6">
                <label for="dosage" class="form-label">Dosage *</label>
                <input type="text" class="form-control" id="dosage" name="dosage" required
                       value="{{ med.dosage if med else '' }}" placeholder="e.g. 10mg">
              </div>
            </div>

            <div class="mb-3">
              <label for="frequency" class="form-label">Frequency *</label>
              <select class="form-select" id="frequency" name="frequency" required>
                <option value="">Select frequency...</option>
                <option value="Daily" {% if med and med.frequency == 'Daily' %}selected{% endif %}>Daily</option>
                <option value="Twice a day" {% if med and med.frequency == 'Twice a day' %}selected{% endif %}>Twice a day</option>
                <option value="Three times a day" {% if med and med.frequency == 'Three times a day' %}selected{% endif %}>Three times a day</option>
                <option value="Weekly" {% if med and med.frequency == 'Weekly' %}selected{% endif %}>Weekly</option>
                <option value="As needed" {% if med and med.frequency == 'As needed' %}selected{% endif %}>As needed</option>
              </select>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="start_date" class="form-label">Start Date</label>
                <input type="date" class="form-control" id="start_date" name="start_date"
                       value="{{ med.start_date | format_ist('%Y-%m-%d') if med and med.start_date else '' }}">
              </div>
              <div class="col-md-6">
                <label for="end_date" class="form-label">End Date (Optional)</label>
                <input type="date" class="form-control" id="end_date" name="end_date"
                       value="{{ med.end_date | format_ist('%Y-%m-%d') if med and med.end_date else '' }}">
              </div>
            </div>

            <div class="mb-3">
              <label for="notes" class="form-label">Special Instructions / Notes</label>
              <textarea class="form-control" id="notes" name="notes" rows="3" 
                        placeholder="e.g. Take with food">{{ med.notes if med else '' }}</textarea>
            </div>

            <div class="mb-4 form-check form-switch">
              <input class="form-check-input" type="checkbox" id="is_active" name="is_active" 
                     {% if (med and med.is_active) or not med %}checked{% endif %}>
              <label class="form-check-label" for="is_active">Currently Active</label>
            </div>

            <div class="d-flex justify-content-end">
              <a href="{{ url_for('treatment.index') }}" class="btn btn-secondary me-2">Cancel</a>
              <button type="submit" class="btn btn-primary">Save Medication</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
